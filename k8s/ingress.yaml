apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: app-ingress
  annotations:
    nginx.ingress.kubernetes.io/rewrite-target: /
spec:
  rules:
    - host: gateway.local
      http:
        paths:
          - path: /
            pathType: Prefix
            backend:
              service:
                name: api-gateway
                port:
                  number: 8080

    - host: vets.local
      http:
        paths:
          - path: /
            pathType: Prefix
            backend:
              service:
                name: vets-service
                port:
                  number: 8080

    - host: visits.local
      http:
        paths:
          - path: /
            pathType: Prefix
            backend:
              service:
                name: visits-service
                port:
                  number: 8080
